version: "3.9"

# OBI (OpenTelemetry eBPF Instrumentation) zero-code demo for soma-observe.
#
# Demonstrates automatic trace + RED-metric capture with NO code changes to
# the instrumented services. Uses Grafana Beyla (the OBI downstream distribution)
# to instrument two nginx services and export OTLP to soma-observe.
#
# Requirements:
#   - Linux kernel 5.8+ with BTF (/sys/kernel/btf/vmlinux must exist).
#     Cross-service context propagation (the frontend→backend edge) needs 5.17+.
#   - Docker with privileged container support.
#   - The soma-platform parent directory must be present at ../.. relative to
#     this file (the soma-observe Dockerfile needs it as build context).
#
# Usage:
#   docker compose -f deploy/obi/docker-compose.yml up --build
#
# What to look for after ~60 s:
#   - http://localhost:4318/api/v1/services → shows "frontend" and "backend"
#   - Metrics (http.server.request.duration), Traces, and a service map edge
#     frontend → backend visible in the embedded UI at http://localhost:4318/

services:

  # ---------------------------------------------------------------------------
  # Postgres — identical to the root docker-compose.yml
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soma
      POSTGRES_USER: soma
      POSTGRES_PASSWORD: soma
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soma -d soma"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # soma-observe — built from source (parent soma-platform/ dir is the context)
  # No AUTH_TOKEN so Beyla's OTLP exporter needs no Authorization header.
  # If you add AUTH_TOKEN, also set OTEL_EXPORTER_OTLP_TRACES_HEADERS and
  # OTEL_EXPORTER_OTLP_METRICS_HEADERS on the beyla service (see docs/ebpf-obi.md).
  # ---------------------------------------------------------------------------
  soma-observe:
    # The Dockerfile builds an x86_64/musl static binary (hard-coded trunk + musl
    # target), so pin amd64. No-op on x86_64 hosts; runs under emulation on Apple
    # Silicon (fine — it's just an HTTP server). Beyla below stays NATIVE arch so
    # its eBPF programs match the host kernel.
    platform: linux/amd64
    build:
      context: ../../..
      dockerfile: soma-observe/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://soma:soma@postgres:5432/soma
      LISTEN_ADDR: "0.0.0.0:4318"
      # AUTH_TOKEN: "change-me"   # omit for this demo; see docs/ebpf-obi.md if set
    ports:
      - "4318:4318"   # OTLP/HTTP ingest + JSON query API + embedded UI

  # ---------------------------------------------------------------------------
  # backend — plain nginx serving a static page on :80.
  # Intentionally plain HTTP so OBI context propagation works end-to-end.
  # ---------------------------------------------------------------------------
  backend:
    image: nginx:alpine
    # No extra config needed — default nginx serves on :80.

  # ---------------------------------------------------------------------------
  # frontend — nginx on :8080 that proxy_pass-es every request to backend.
  # This single hop creates the frontend→backend dependency edge OBI captures.
  # ---------------------------------------------------------------------------
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"   # Expose for manual curl checks; loadgen uses internal DNS
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # loadgen — continuous HTTP traffic so Beyla has data to capture immediately.
  # ---------------------------------------------------------------------------
  loadgen:
    image: curlimages/curl:latest
    depends_on:
      - frontend
    # Restart on failure so it retries if frontend isn't up yet.
    restart: on-failure
    entrypoint: ["sh", "-c", "while true; do curl -s http://frontend:8080/ >/dev/null; sleep 0.5; done"]

  # ---------------------------------------------------------------------------
  # beyla — Grafana Beyla (OBI downstream distribution).
  #
  # Service-naming approach: a single Beyla instance with a mounted
  # beyla-config.yml that uses discovery.services rules to match each nginx
  # service by its open port and assign a distinct name ("frontend" on :8080,
  # "backend" on :80). This is cleaner than two sidecar containers because it
  # avoids duplicating exporter config and keeps BEYLA_BPF_CONTEXT_PROPAGATION
  # in one place.
  #
  # pid: "host" is required so Beyla can see both nginx processes.
  # privileged: true is the simplest kernel access path; see k8s-daemonset.yaml
  # for the least-privilege CAP_BPF / CAP_PERFMON / CAP_SYS_PTRACE / CAP_NET_ADMIN
  # alternative.
  # ---------------------------------------------------------------------------
  beyla:
    image: grafana/beyla:latest
    privileged: true
    pid: "host"
    volumes:
      - ./beyla-config.yml:/config/beyla-config.yml:ro
      # Expose the host BTF map so Beyla can find /sys/kernel/btf/vmlinux.
      - /sys/kernel/btf:/sys/kernel/btf:ro
    environment:
      BEYLA_CONFIG_PATH: /config/beyla-config.yml
      # Export to soma-observe (plain HTTP; Beyla auto-appends /v1/traces and /v1/metrics)
      OTEL_EXPORTER_OTLP_ENDPOINT: http://soma-observe:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      # Enable cross-service context propagation (kernel 5.17+ required for edges)
      BEYLA_BPF_CONTEXT_PROPAGATION: "all"
      # Surface Beyla's own health metrics for debugging
      BEYLA_INTERNAL_METRICS_PROMETHEUS_PORT: "9090"
    depends_on:
      - soma-observe
      - frontend
      - backend

volumes:
  postgres_data:
