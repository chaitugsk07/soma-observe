manifest_version: 1
versions:
  - version: 1
    description: "Initial soma_observe schema: metric series, metric points (partitioned), histogram points (partitioned), logs (partitioned)"
    migrations:
      - file: "20260628_01_init.sql"
        created: "2026-06-28"
        author: "soma-observe"
        why: "Bootstrap the partitioned observability schema. Child partitions are created at runtime by the partition manager (T6), not in this migration."
  - version: 2
    description: "Add spans table for distributed trace storage (partitioned by start_time)"
    migrations:
      - file: "20260629_01_spans.sql"
        created: "2026-06-29"
        author: "soma-observe"
        why: "Add OTLP traces support. Spans are stored in a partitioned table with indexes for trace_id, service_name, and attribute containment queries."
  - version: 3
    description: "Add alerting tables: alert_rules (metric/log threshold config) and alert_state (ok/pending/firing evaluator state)"
    migrations:
      - file: "20260629_02_alerts.sql"
        created: "2026-06-29"
        author: "soma-observe"
        why: "Bootstrap minimal-credible alerting: metric-threshold and log-count rules with webhook notifications."
  - version: 4
    description: "Add exemplar_trace_id / exemplar_span_id to metric_point for metric→trace cross-signal correlation"
    migrations:
      - file: "20260629_03_exemplars.sql"
        created: "2026-06-29"
        author: "soma-observe"
        why: "OTLP NumberDataPoints carry exemplars (sampled trace_id/span_id). Storing them on metric_point lets the UI deep-link from a metric data point to the corresponding trace."
  - version: 5
    description: "Add dashboards table for user-defined metric panel collections"
    migrations:
      - file: "20260629_04_dashboards.sql"
        created: "2026-06-29"
        author: "soma-observe"
        why: "Savable dashboards: named collections of metric panels stored as opaque jsonb. Config data — not partitioned."
